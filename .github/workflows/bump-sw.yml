name: Bump SW cache version

on:
  push:
    branches: [master]
    paths-ignore:
      - 'sw.js'

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump SW cache version to commit SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/const CACHE_NAME = 'farmlog-cache-[^']*'/const CACHE_NAME = 'farmlog-cache-${SHORT_SHA}'/" sw.js

      - name: Commit and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: bump SW cache to ${SHORT_SHA} [skip ci]"
          git push
