<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FarmLog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <header class="app-header">
    <h1>FarmLog</h1>
    <div class="status-badge">
      <span class="status-dot" aria-hidden="true"></span>
      <span>Online</span>
    </div>
  </header>

  <main>
    <!-- Home View -->
    <div id="view-home" class="view">
      <section aria-label="Quick actions">
        <p class="section-label">Quick log</p>
        <div class="quick-actions">
          <button class="action-btn water" onclick="openModal('water')">
            <span class="icon" aria-hidden="true">💧</span>
            <span>Log Fertigation / Watering</span>
          </button>
          <button class="action-btn pest" onclick="openModal('pest')">
            <span class="icon" aria-hidden="true">🐛</span>
            <span>Log Pest / Treatment</span>
          </button>
          <button class="action-btn harvest" onclick="openModal('harvest')">
            <span class="icon" aria-hidden="true">🧺</span>
            <span>Log Harvest / Sale</span>
          </button>
          <button class="action-btn crop" onclick="openModal('crop')">
            <span class="icon" aria-hidden="true">🌱</span>
            <span>Log Crop Action</span>
          </button>
        </div>
      </section>

      <section aria-label="Active batches">
        <div class="section-header">
          <p class="section-label">Active beds</p>
          <button class="add-bed-btn" onclick="addBed()">+ Add Bed</button>
        </div>
        <div id="batchList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading beds...</p>
        </div>
      </section>
    </div>

    <!-- Formulas View -->
    <div id="view-formulas" class="view" hidden>
      <section aria-label="Formulas">
        <p class="section-label">Formulas</p>
        <div id="formulaList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading formulas...</p>
        </div>
      </section>
    </div>

    <!-- Data View -->
    <div id="view-data" class="view" hidden>
      <section aria-label="Recent logs">
        <p class="section-label">Recent logs</p>
        <div id="logList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading logs...</p>
        </div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <button class="nav-btn active" data-view="home">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-view="formulas">
      <span class="nav-icon" aria-hidden="true">🧪</span>
      <span>Formulas</span>
    </button>
    <button class="nav-btn" data-view="data">
      <span class="nav-icon" aria-hidden="true">📊</span>
      <span>Data</span>
    </button>
  </nav>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="modalTitle">Log activity</h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>

      <form id="logForm" onsubmit="handleSubmit(event)" novalidate>
        <div class="form-field">
          <label for="logDate">Date</label>
          <input type="date" id="logDate" required>
        </div>

        <div class="form-field">
          <label for="activityCategory">Activity category</label>
          <select id="activityCategory" required>
            <option value="" disabled selected>Select category</option>
            <option value="sowing">Sowing</option>
            <option value="watering">Watering</option>
            <option value="pest_control">Pest control</option>
            <option value="harvest">Harvest</option>
          </select>
        </div>

        <div class="form-field">
          <label for="bedScope">Farm scope</label>
          <select id="bedScope" required>
            <option value="all">Whole Farm</option>
          </select>
        </div>

        <div class="form-field" id="currentCropsField" hidden>
          <label>Currently growing in this bed</label>
          <div id="currentCropsTags" class="crop-tags"></div>
        </div>

        <div class="form-field" id="harvestCropsField" hidden>
          <label>Mark as done (harvested)</label>
          <div id="harvestCropsList" class="harvest-crops-list"></div>
        </div>

        <div class="form-field" id="newCropField" hidden>
          <label for="newCropName">Crop being sown</label>
          <input type="text" id="newCropName" placeholder="e.g. Red Amaranth">
        </div>

        <div class="form-field">
          <label for="inputsUsed">
            Inputs used
            <span class="hint" id="inputsHint">e.g. Master Mix, LAB serum, BSF compost</span>
          </label>
          <textarea id="inputsUsed" placeholder="List inputs used for this activity" aria-describedby="inputsHint"></textarea>
        </div>

        <div class="form-field">
          <label>Financials (optional)</label>
          <div class="money-row">
            <input type="number" id="costRM" placeholder="Cost (RM)" inputmode="decimal" min="0" step="0.01">
            <input type="number" id="revenueRM" placeholder="Revenue (RM)" inputmode="decimal" min="0" step="0.01">
          </div>
        </div>

        <button type="submit" class="submit-btn">Save log</button>
      </form>
    </div>
  </div>

  <!-- Bed Detail Sheet -->
  <div class="modal-overlay" id="bedDetailOverlay">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="bedDetailTitle">Bed</h2>
        <button class="modal-close" onclick="closeBedDetail()" aria-label="Close">✕</button>
      </div>
      <div id="bedDetailContent"></div>
      <button class="submit-btn" id="bedDetailLogBtn" style="margin-top:16px;" onclick="logForBed()">
        Log activity for this bed
      </button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
