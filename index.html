<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a8f3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>FarmLog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

  <div id="updateBanner" class="update-banner" hidden>
    New version available — <button onclick="window.location.reload()" class="update-banner-btn">Refresh</button>
  </div>

  <header class="app-header">
    <h1>FarmLog</h1>
    <div class="header-actions">
      <button class="formulas-btn" onclick="switchView('formulas')" aria-label="Formulas">🧪</button>
      <div class="status-badge">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Online</span>
      </div>
    </div>
  </header>

  <main>
    <!-- Home View -->
    <div id="view-home" class="view">

      <!-- Beds first — primary content -->
      <section aria-label="Active beds">
        <div class="section-header">
          <p class="section-label">Active beds</p>
          <button class="add-bed-btn" onclick="addBed()">+ Add Bed</button>
        </div>
        <div id="batchList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading beds...</p>
        </div>
      </section>

      <!-- Quick log — secondary, for whole-farm or fast access -->
      <section aria-label="Quick actions">
        <p class="section-label">Quick log</p>
        <div class="quick-actions">
          <button class="action-btn water" onclick="openModal('water')">
            <span class="icon" aria-hidden="true">💧</span>
            <span>Irrigate</span>
          </button>
          <button class="action-btn pest" onclick="openModal('pest')">
            <span class="icon" aria-hidden="true">🐛</span>
            <span>Pest Control</span>
          </button>
          <button class="action-btn harvest" onclick="openModal('harvest')">
            <span class="icon" aria-hidden="true">🧺</span>
            <span>Harvest</span>
          </button>
          <button class="action-btn crop" onclick="openModal('crop')">
            <span class="icon" aria-hidden="true">🌱</span>
            <span>Sow Crop</span>
          </button>
          <button class="action-btn sale" onclick="openSaleModal()">
            <span class="icon" aria-hidden="true">💰</span>
            <span>Log Sale</span>
          </button>
        </div>
      </section>

    </div>

    <!-- Formulas View -->
    <div id="view-formulas" class="view" hidden>
      <section aria-label="Formulas">
        <p class="section-label">Formulas</p>
        <div class="formula-volume-global">
          <span class="formula-calc-label">Sprayer volume</span>
          <div class="formula-volume-wrap">
            <input type="number" id="globalSprayerVol" value="16" min="1" max="100" step="1"
                   oninput="recalcAllDoses(this.value)">
            <span class="formula-volume-unit">L</span>
          </div>
        </div>
        <div id="formulaList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading formulas...</p>
        </div>
      </section>
    </div>

    <!-- Activity View -->
    <div id="view-data" class="view" hidden>
      <section aria-label="Activity log">
        <p class="section-label">Activity</p>
        <div id="bedFilterChips" class="bed-filter-chips"></div>
        <div id="typeFilterChips" class="bed-filter-chips"></div>
        <div id="logList">
          <p style="color:#888;font-size:14px;padding:8px 4px;">Loading logs...</p>
        </div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <button class="nav-btn active" data-view="home">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-view="data">
      <span class="nav-icon" aria-hidden="true">📊</span>
      <span>Activity</span>
    </button>
  </nav>

  <!-- Log Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="modalTitle">Log activity</h2>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>

      <form id="logForm" onsubmit="handleSubmit(event)" novalidate>
        <div class="form-field">
          <label for="logDate">Date</label>
          <input type="date" id="logDate" required>
        </div>

        <div class="form-field">
          <label for="activityCategory">Activity category</label>
          <select id="activityCategory" required>
            <option value="" disabled selected>Select category</option>
            <option value="sowing">Sowing</option>
            <option value="watering">Watering</option>
            <option value="pest_control">Pest control</option>
            <option value="harvest">Harvest</option>
          </select>
        </div>

        <div class="form-field">
          <label for="bedScope">Farm scope</label>
          <select id="bedScope" required>
            <option value="all">Whole Farm</option>
          </select>
        </div>

        <!-- Context bar: shows current crops for selected bed -->
        <div id="bedContextBar" class="bed-context-bar" hidden></div>

        <div class="form-field" id="currentCropsField" hidden>
          <label>Currently growing in this bed</label>
          <div id="currentCropsTags" class="crop-tags"></div>
        </div>

        <div class="form-field" id="harvestCropsField" hidden>
          <label>Mark as done (harvested)</label>
          <div id="harvestCropsList" class="harvest-crops-list"></div>
        </div>

        <div class="form-field" id="newCropField" hidden>
          <label for="newCropName">Crop being sown</label>
          <input type="text" id="newCropName" placeholder="e.g. Red Amaranth">
        </div>

        <!-- Collapsible extras -->
        <div class="form-extras-toggles">
          <button type="button" class="extras-toggle" id="toggleInputsBtn" onclick="toggleInputs()">＋ Add inputs / notes</button>
          <button type="button" class="extras-toggle" id="toggleFinancialsBtn" onclick="toggleFinancials()">＋ Add financials</button>
        </div>

        <div class="form-field" id="inputsField" hidden>
          <label for="inputsUsed">
            Inputs used
            <span class="hint" id="inputsHint">e.g. Master Mix, LAB serum, BSF compost</span>
          </label>
          <textarea id="inputsUsed" placeholder="List inputs used for this activity" aria-describedby="inputsHint"></textarea>
        </div>

        <div class="form-field" id="financialsField" hidden>
          <label>Financials</label>
          <div class="money-row">
            <input type="number" id="costRM" placeholder="Cost (RM)" inputmode="decimal" min="0" step="0.01">
            <input type="number" id="revenueRM" placeholder="Revenue (RM)" inputmode="decimal" min="0" step="0.01">
          </div>
        </div>

        <button type="submit" class="submit-btn">Save log</button>
      </form>
    </div>
  </div>

  <!-- Bed Detail Sheet -->
  <div class="modal-overlay" id="bedDetailOverlay">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="bedDetailTitle">Bed</h2>
        <button class="modal-close" onclick="closeBedDetail()" aria-label="Close">✕</button>
      </div>
      <div id="bedDetailContent"></div>
      <div class="bed-log-actions">
        <button class="action-btn water" onclick="logForBed('water')">
          <span class="icon" aria-hidden="true">💧</span><span>Water</span>
        </button>
        <button class="action-btn pest" onclick="logForBed('pest')">
          <span class="icon" aria-hidden="true">🐛</span><span>Pest</span>
        </button>
        <button class="action-btn harvest" onclick="logForBed('harvest')">
          <span class="icon" aria-hidden="true">🧺</span><span>Harvest</span>
        </button>
        <button class="action-btn crop" onclick="logForBed('crop')">
          <span class="icon" aria-hidden="true">🌱</span><span>Sow</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sale Modal -->
  <div class="modal-overlay" id="saleModalOverlay">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2>Log Sale</h2>
        <button class="modal-close" onclick="closeSaleModal()" aria-label="Close">✕</button>
      </div>
      <form id="saleForm" onsubmit="handleSaleSubmit(event)" novalidate>

        <div class="form-field">
          <label for="saleDate">Date</label>
          <input type="date" id="saleDate" required>
        </div>

        <div class="form-field">
          <label for="saleCrop">Crop</label>
          <input type="text" id="saleCrop" placeholder="e.g. Kangkong" list="activeCropsList" required autocomplete="off">
          <datalist id="activeCropsList"></datalist>
        </div>

        <div class="form-field">
          <label>Quantity &amp; unit</label>
          <div class="sale-qty-row">
            <input type="number" id="saleQty" placeholder="0" inputmode="decimal" min="0" step="any" required oninput="calcSaleTotal()">
            <select id="saleUnit">
              <option value="kg">kg</option>
              <option value="ikat">ikat</option>
              <option value="bag">bag</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label for="salePricePerUnit">Price per unit (RM)</label>
          <input type="number" id="salePricePerUnit" placeholder="0.00" inputmode="decimal" min="0" step="0.01" required oninput="calcSaleTotal()">
        </div>

        <div class="sale-total-bar" id="saleTotalBar">
          Total: <strong id="saleTotalDisplay">RM 0.00</strong>
        </div>

        <button type="submit" class="submit-btn">Save sale</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
